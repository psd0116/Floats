services:
  # 1) Frontend 서비스 (React + Vite)
  frontend:
    build:
      context: ./apps/web
      target: dev
    image: kids-art-app-frontend
    container_name: kids-art-app-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/index.html:/app/index.html
    environment:
      - VITE_API_URL=http://backend:4000
    restart: unless-stopped
    depends_on:
      - backend

  # 2) Backend 서비스 (Node.js + Express)
  backend:
    build:
      context: ./apps/api
      target: dev
    image: kids-art-app-backend
    container_name: kids-art-app-backend
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/prisma:/app/prisma
      - ./apps/api/prisma.config.ts:/app/prisma.config.ts
    env_file:
      - ./apps/api/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@kids-art-app-db:5432/art_app
    restart: unless-stopped
    depends_on:
      - db

  # 3) Local PostgreSQL DB
  db:
    image: postgres:16-alpine
    container_name: kids-art-app-db
    ports:
      - "5432:5432"  # 로컬 백엔드(pnpm dev) 연결을 위해 주석 해제됨
    env_file:
      - ./apps/api/.env.db
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
